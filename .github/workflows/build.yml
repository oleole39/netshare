name: Flutter app build and release

on:
  push:
    tags:
      - '*' #on new tag
  workflow_dispatch:

jobs:
  release-app:
    name: Release app as ${{ matrix.build-type }} (${{ matrix.platform }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: netshare
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            build-type: apk
          - os: windows-latest
            platform: windows
            build-type: windows
          - os: ubuntu-latest
            platform: linux
            build-type: debian
          - os: ubuntu-latest
            platform: linux
            build-type: debian
          - os: macos-14
            platform: macos
            build-type: macos
          - os: macos-14
            platform: ios
            build-type: ipa
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - run: flutter --version
      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          # AGP8 needs JDK 17
          distribution: 'temurin'
          java-version: '17'
      - name: Install Linux Dependencies
        # Install libunwind-dev, see https://github.com/actions/runner-images/issues/6399#issuecomment-1285011525
        # Install other base packages, see https://medium.com/@fluttergems/packaging-and-distributing-flutter-desktop-apps-the-missing-guide-part-3-linux-24ef8d30a5b4#e8f7
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - name: Find release version
        id: release-version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION=$(echo "$VERSION_LINE" | sed -E 's/version: *([^ ]*)/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Build
        uses: oberhauser-dev/flutter-release-action@v0
        with:
          working-directory: netshare
          dry-run: false
          app-name: 'netshare'
          app-version: ${{ steps.release-version.outputs.version }}
          tag: ${{ github.ref }}
          build-type: ${{ matrix.build-type }}
          token: ${{ github.token }}
