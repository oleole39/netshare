name: Flutter app build and release

on:
  push:
    tags:
      - '*' #on new tag
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pre-run:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Find release version 
        id: release-version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_WITH_BUILD_NUMBER=$(echo "$VERSION_LINE" | sed -E 's/version: *([^ ]*)/\1/')
          VERSION=${VERSION_WITH_BUILD_NUMBER%+*}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create the new tag
        # Taken from https://stackoverflow.com/questions/60963759/use-github-actions-to-create-a-tag-but-not-a-release/64479344#64479344
        uses: actions/github-script@v5
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.release-version.outputs.version }}',
              sha: context.sha
            })
      #- name: Create release
      #  uses: softprops/action-gh-release@v3
      #  with:
      #    name: v${{ steps.release-version.outputs.version }}
      #    tag_name: ${{ steps.release-version.outputs.version }}
      #    body: Draft release #TODO - add release description here, cf. https://github.com/softprops/action-gh-release#inputs
      #    draft: true

    outputs:
      release-version: ${{ steps.release-version.outputs.version }}

  release-app:
    name: Release app as ${{ matrix.build-type }} (${{ matrix.platform }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: pre-run
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            build-type: apk
          - os: windows-latest
            platform: windows
            build-type: windows
          - os: ubuntu-latest
            platform: linux
            build-type: debian
          - os: macos-latest
            platform: macos
            build-type: macos
          - os: macos-latest
            platform: ios
            build-type: ipa
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - run: flutter --version
      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Linux Dependencies
        # Install libayatana-appindicator3-dev for app flutter deps, see https://github.com/leanflutter/tray_manager#linux-requirements
        # Install libunwind-dev, see https://github.com/actions/runner-images/issues/6399#issuecomment-1285011525
        # Install other base packages, see https://medium.com/@fluttergems/packaging-and-distributing-flutter-desktop-apps-the-missing-guide-part-3-linux-24ef8d30a5b4#e8f7
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev 
      - name: Build
        uses: oberhauser-dev/flutter-release-action@v0
        with:
          dry-run: false
          app-version: ${{ needs.pre-run.outputs.release-version }}
          tag: ${{ needs.pre-run.outputs.release-version }}
          build-type: ${{ matrix.build-type }}
          token: ${{ github.token }}
